<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AssetFlow – Asset Maintenance Tracking.">
  <title>Maintenance – AssetFlow ERP</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
</head>

<body>
  <div class="app-shell">
    <div id="sidebar-container"></div>
    <main class="main-content" id="main-content">
      <header class="topbar">
        <button class="topbar-mobile-toggle" id="mobile-menu-toggle">☰</button>
        <div class="topbar-title"><span>🔧</span> Maintenance Tracking</div>
        <div class="topbar-actions">
          <button class="btn btn-primary" onclick="openMaintModal()">＋ Report Issue</button>
        </div>
      </header>

      <div class="page-body">
        <!-- Maintenance Table -->
        <div class="card animate-fade-up">
          <div class="card-header">
            <div class="card-title">🔧 Maintenance Logs</div>
            <div class="toolbar">
              <select class="select-control" id="status-filter">
                <option value="">All Statuses</option>
                <option value="PENDING">Pending</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="COMPLETED">Completed</option>
              </select>
            </div>
          </div>
          <div class="table-container">
            <table class="table" id="maint-table">
              <thead>
                <tr>
                  <th>Ticket ID</th>
                  <th>Asset</th>
                  <th>Issue Type</th>
                  <th>Reported By</th>
                  <th>Date Reported</th>
                  <th>Cost</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="maint-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Report Issue Modal -->
  <div class="modal-backdrop" id="maint-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">🔧 Report Maintenance Issue</div>
        <button class="modal-close" onclick="Utils.closeModal('maint-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Asset <span class="required">*</span></label>
            <select id="maint-asset" class="form-control">
              <option value="">Select Asset...</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Issue Type <span class="required">*</span></label>
            <select id="maint-type" class="form-control">
              <option value="HARDWARE">Hardware Failure</option>
              <option value="SOFTWARE">Software Issue</option>
              <option value="ROUTINE">Routine Servicing</option>
              <option value="DAMAGE">Physical Damage</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Description <span class="required">*</span></label>
            <textarea id="maint-desc" class="form-control" rows="3" placeholder="Describe the issue..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Estimated Cost (₹)</label>
            <input type="number" id="maint-cost" class="form-control" placeholder="0">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Utils.closeModal('maint-modal')">Cancel</button>
        <button class="btn btn-primary" id="maint-save-btn" onclick="saveMaint()">Submit Ticket</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/maintenance.js"></script>
</body>

</html>
