server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/assetflow?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
    username: root
    password: MYSQL@tg
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update       # use 'validate' in production
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

jwt:
  secret: assetflow-super-secret-jwt-key-change-in-production-minimum-256-bits
  expiration-ms: 86400000   # 24 hours

logging:
  level:
    com.assetflow: DEBUG
    org.springframework.security: INFO

# CORS – allow the frontend origins
assetflow:
  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "http://127.0.0.1:5500"
      - "http://localhost:5500"
