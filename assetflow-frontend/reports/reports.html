<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AssetFlow – Generate custom reports.">
  <title>Reports – AssetFlow ERP</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar-container"></div>
  <main class="main-content" id="main-content">
    <header class="topbar">
      <button class="topbar-mobile-toggle" id="mobile-menu-toggle">☰</button>
      <div class="topbar-title"><span>📈</span> Reporting & Analytics</div>
    </header>

    <div class="page-body">
      <div class="card animate-fade-up">
        <div class="card-header">
          <div class="card-title">Generate Report</div>
        </div>
        <div class="card-body">
          <div class="form-grid form-grid-3">
            <div class="form-group">
              <label class="form-label">Report Type</label>
              <select id="report-type" class="form-control">
                <option value="ASSET_SUMMARY">Asset Summary</option>
                <option value="DEPRECIATION">Depreciation Report</option>
                <option value="MAINTENANCE">Maintenance Logs</option>
                <option value="ALLOCATION">Allocation History</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Start Date</label>
              <input type="date" id="report-start" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">End Date</label>
              <input type="date" id="report-end" class="form-control">
            </div>
          </div>
          <div style="margin-top:1.5rem;display:flex;gap:1rem">
            <button class="btn btn-primary" onclick="ReportsPage.generate('pdf')">Download PDF</button>
            <button class="btn btn-secondary" onclick="ReportsPage.generate('csv')">Download CSV</button>
            <button class="btn btn-secondary" onclick="ReportsPage.generate('excel')">Download Excel</button>
          </div>
        </div>
      </div>

      <!-- Recent Reports -->
      <div class="card animate-fade-up" style="margin-top:1.5rem">
        <div class="card-header">
          <div class="card-title">Recent Reports</div>
        </div>
        <div class="table-container">
          <table class="table">
            <thead><tr><th>Report Name</th><th>Generated By</th><th>Date</th><th>Format</th><th>Action</th></tr></thead>
            <tbody id="reports-tbody">
              <tr>
                <td>Asset Summary_Mar2024</td>
                <td>Alice Johnson</td>
                <td>2024-03-01</td>
                <td><span class="badge badge-primary">PDF</span></td>
                <td><button class="btn btn-ghost btn-sm">Download</button></td>
              </tr>
              <tr>
                <td>Depreciation_Q1</td>
                <td>Admin</td>
                <td>2024-03-05</td>
                <td><span class="badge badge-neutral">Excel</span></td>
                <td><button class="btn btn-ghost btn-sm">Download</button></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/reports.js"></script>
</body>
</html>
