<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AssetFlow – System Activity Logs.">
  <title>Activity Logs – AssetFlow ERP</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar-container"></div>
  <main class="main-content" id="main-content">
    <header class="topbar">
      <button class="topbar-mobile-toggle" id="mobile-menu-toggle">☰</button>
      <div class="topbar-title"><span>📜</span> System Activity Logs</div>
    </header>

    <div class="page-body">
      <div class="card animate-fade-up">
        <div class="card-header">
          <div class="card-title">Audit Trail</div>
          <div class="toolbar">
            <div class="search-box">
              <span class="search-icon">🔍</span>
              <input type="text" id="log-search" class="form-control" placeholder="Search logs...">
            </div>
          </div>
        </div>
        <div class="table-container">
          <table class="table" id="log-table">
            <thead>
              <tr>
                <th>Timestamp</th>
                <th>User</th>
                <th>Action</th>
                <th>Module</th>
                <th>Details</th>
              </tr>
            </thead>
            <tbody id="log-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/activity-logs.js"></script>
</body>
</html>
